name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: taiki-e/install-action@nextest
    - run: cargo fmt --all --check --verbose
    - run: cargo clippy --all-targets --all-features
    - run: cargo nextest run -r --workspace --all-features
    - run: cargo test -r --doc

  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview
    - uses: taiki-e/install-action@cargo-llvm-cov
    - uses: taiki-e/install-action@nextest
    - run: |
        cargo llvm-cov --no-report nextest --all-features --workspace
        cargo llvm-cov --no-report --doc --all-features --workspace
        cargo llvm-cov report --doctests --lcov --output-path lcov.info --ignore-filename-regex "(scripts/*|qrs_core_derive/*)"
    - uses: codecov/codecov-action@v3

  gen_doc:
    runs-on: ubuntu-latest
    needs: [ci, coverage]
    
    steps:
    - uses: actions/checkout@v3
    - name: Run doc
      run: cargo doc --no-deps --workspace --all-features
    - name: Deploy
      uses: actions/upload-pages-artifact@v1
      with:
        path: target/doc
        
  deploy_doc:
     needs: gen_doc
     permissions:
       pages: write
       id-token: write
     environment:
       name: github-pages
       url: ${{ steps.deployment.outputs.page_url }}
     runs-on: ubuntu-latest
     steps:
       - name: Deploy to GitHub Pages
         id: deployment
         uses: actions/deploy-pages@v1
         
