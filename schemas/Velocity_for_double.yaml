$schema: http://json-schema.org/draft-07/schema#
title: Velocity_for_double
description: A change per given duration.
type: object
required:
- change
- duration
properties:
  change:
    type: number
    format: double
  duration:
    $ref: '#/definitions/Duration'
definitions:
  Duration:
    description: Duration in ISO 8601 format(month and year are not available to avoid ambiguity)
    examples:
    - PT1S
    - PT1M
    - PT1H
    - P1D
    - P1W
    - P1DT1H1M1S
    type: string
