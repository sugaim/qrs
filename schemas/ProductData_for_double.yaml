$schema: http://json-schema.org/draft-07/schema#
title: ProductData_for_double
type: object
required:
- cashflows
- collateral
- constants
- legs
- markets
- processes
properties:
  cashflows:
    type: object
    additionalProperties:
      $ref: '#/definitions/Cashflow_for_VariableTypesForData_for_double'
  collateral:
    $ref: '#/definitions/Collateral'
  constants:
    type: object
    additionalProperties:
      $ref: '#/definitions/Constant'
  legs:
    type: object
    additionalProperties:
      $ref: '#/definitions/Leg_for_VariableTypesForData_for_double'
  markets:
    type: object
    additionalProperties:
      $ref: '#/definitions/Market'
  processes:
    type: object
    additionalProperties:
      $ref: '#/definitions/Process_for_VariableTypesForData_for_double'
definitions:
  CalendarSymbol:
    description: A symbol for a calendar. Combined calendars are available. As an atom, only alphanumeric characters or '_' are allowed.
    examples:
    - TK
    - TK|NY
    - TK&NY
    - (TK|NY)&(LN|TK)
    type: string
  Cashflow_for_VariableTypesForData_for_double:
    oneOf:
    - type: object
      required:
      - coupon_base
      - rate
      - type
      properties:
        coupon_base:
          $ref: '#/definitions/CouponBase_for_VariableTypesForData_for_double'
        rate:
          $ref: '#/definitions/ValueOrId_for_double'
        type:
          type: string
          const: fixed_coupon
    - type: object
      required:
      - convention
      - coupon_base
      - reference_rate
      - type
      properties:
        convention:
          type: string
        coupon_base:
          $ref: '#/definitions/CouponBase_for_VariableTypesForData_for_double'
        gearing:
          $ref: '#/definitions/ValueOrId_for_double'
        reference_rate:
          type: string
        spread:
          $ref: '#/definitions/ValueOrId_for_double'
        type:
          type: string
          const: overnight_index_coupon
  Ccy:
    type: string
    enum:
    - JPY
    - USD
  Collateral:
    oneOf:
    - description: Money
      type: object
      required:
      - ccy
      - type
      properties:
        ccy:
          $ref: '#/definitions/Ccy'
        type:
          type: string
          const: money
    - description: Equity shares
      type: object
      required:
      - company
      - type
      properties:
        company:
          type: string
        type:
          type: string
          const: share
  Constant:
    oneOf:
    - type: object
      required:
      - Number
      properties:
        Number:
          type: number
          format: double
      additionalProperties: false
    - type: object
      required:
      - Int
      properties:
        Int:
          type: integer
          format: int64
      additionalProperties: false
    - type: object
      required:
      - Boolean
      properties:
        Boolean:
          type: boolean
      additionalProperties: false
    - type: object
      required:
      - Object
      properties:
        Object: true
      additionalProperties: false
  CouponBase_for_VariableTypesForData_for_double:
    type: object
    required:
    - daycount
    - entitle
    - notional
    - payment
    - period_end
    - period_start
    properties:
      daycount:
        $ref: '#/definitions/DayCountSymbol'
      entitle:
        $ref: '#/definitions/DateWithTag_for_String'
      notional:
        $ref: '#/definitions/Money_for_ValueOrId_for_double'
      payment:
        $ref: '#/definitions/DateWithTag_for_String'
      period_end:
        $ref: '#/definitions/DateWithTag_for_String'
      period_start:
        $ref: '#/definitions/DateWithTag_for_String'
  DateWithTag_for_String:
    description: Date with a time cut tag. Format is 'yyyy-MM-dd@{tag}'
    type: string
    pattern: ^\d{4}-\d{2}-\d{2}@.*$
  DayCountSymbol:
    oneOf:
    - type: object
      required:
      - type
      properties:
        type:
          type: string
          const: act360
    - type: object
      required:
      - type
      properties:
        type:
          type: string
          const: act365f
    - type: object
      required:
      - type
      properties:
        type:
          type: string
          const: nl360
    - type: object
      required:
      - type
      properties:
        type:
          type: string
          const: nl365
    - type: object
      required:
      - calendar
      - timezone
      - type
      properties:
        calendar:
          $ref: '#/definitions/CalendarSymbol'
        timezone:
          $ref: '#/definitions/TimeZone'
        type:
          type: string
          const: bd252
  Leg_for_VariableTypesForData_for_double:
    oneOf:
    - type: object
      required:
      - cashflows
      - type
      properties:
        cashflows:
          type: array
          items:
            type: string
        type:
          type: string
          const: straight
  Market:
    oneOf:
    - type: object
      required:
      - reference
      - type
      properties:
        reference:
          $ref: '#/definitions/OvernightRate'
        type:
          type: string
          const: overnight_rate
  MinSized1_for_Array_of_MinSized1_for_Map_of_ValueOrId_for_double:
    type: array
    items:
      $ref: '#/definitions/MinSized1_for_Map_of_ValueOrId_for_double'
    minItems: 1
  MinSized1_for_Array_of_String:
    type: array
    items:
      type: string
    minItems: 1
  MinSized1_for_Array_of_ValueOrId_for_double:
    type: array
    items:
      $ref: '#/definitions/ValueOrId_for_double'
    minItems: 1
  MinSized1_for_Map_of_ValueOrId_for_double:
    type: object
    minProperties: 1
    additionalProperties:
      $ref: '#/definitions/ValueOrId_for_double'
  Money_for_ValueOrId_for_double:
    type: object
    required:
    - amount
    - ccy
    properties:
      amount:
        $ref: '#/definitions/ValueOrId_for_double'
      ccy:
        $ref: '#/definitions/Ccy'
  OvernightRate:
    type: string
    enum:
    - TONA
    - SOFR
  Process_for_VariableTypesForData_for_double:
    oneOf:
    - type: object
      required:
      - series
      - type
      properties:
        series:
          $ref: '#/definitions/MinSized1_for_Array_of_MinSized1_for_Map_of_ValueOrId_for_double'
        type:
          type: string
          const: deterministic_float
    - type: object
      required:
      - type
      - values
      properties:
        type:
          type: string
          const: constant_float
        values:
          $ref: '#/definitions/MinSized1_for_Array_of_ValueOrId_for_double'
    - type: object
      required:
      - references
      - type
      properties:
        references:
          $ref: '#/definitions/MinSized1_for_Array_of_String'
        type:
          type: string
          const: market
  TimeZone:
    description: String for timezone. Either of '+/-HH:mm', '+/-HH:mm:ss' or IANA timezone identifier is available
    examples:
    - +09:00
    - -05:00
    - +09:00:00
    - Asia/Tokyo
    - America/New_York
    - Etc/UTC
    type: string
  ValueOrId_for_double:
    oneOf:
    - type: object
      required:
      - Value
      properties:
        Value:
          type: number
          format: double
      additionalProperties: false
    - type: object
      required:
      - Id
      properties:
        Id:
          type: string
      additionalProperties: false
